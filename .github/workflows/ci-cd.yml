name: Spring Boot CI/CD Pipeline

# 1. Trigger the workflow on every push to the repository
on:
  push:
    branches:
      - '**' # Triggers on all branches

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Stage 1: Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # Stage 2: Setup Java 21
      - name: Setup Java JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Stage 3: Build Project
      - name: Build Project with Maven
        run: mvn clean package -DskipTests
        
      # Stage 4: Test Project
      - name: Run Unit Tests
        run: mvn test -Dspring.profiles.active=test
        
      # Email Notification on Failure
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Build FAILED: ${{ github.repository }}"
          to: ${{ github.event.pusher.email }}, srengty@gmail.com
          from: GitHub Actions
          body: |
            Build Status: FAILED
            Commit ID: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            The Spring Boot CI pipeline has failed during the build or test phase.
            Please check the GitHub Actions logs for detailed error reports: 
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
      # Deployment Stage (CD)
      - name: Setup Ansible
        if: success()
        run: |
          sudo apt update
          sudo apt install -y ansible sshpass
          
      # Add strict host key checking override directly inline for automation
      - name: Run Ansible Deployment Playbook
        if: success()
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml
