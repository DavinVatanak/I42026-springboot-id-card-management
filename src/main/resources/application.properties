# ============================================================
# ID Card Management System — Application Properties
# ============================================================

# ── Server ──────────────────────────────────────────────────
server.port=8080
spring.application.name=id-card-management

# ── H2 In-Memory Database (Local Testing) ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:id_card_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Multipart File Upload ────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── File Storage ─────────────────────────────────────────────
app.upload.dir=uploads

# ── QR Code Verification URL ─────────────────────────────────
app.verification.base-url=https://id-system.local/verify

# ── SpringDoc / Swagger UI ───────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── Logging ──────────────────────────────────────────────────
logging.level.com.idcard=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
